<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDD Setback & Bore Plan Calculator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #1a365d;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
        .input-panel {
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #4a5568;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .error-msg {
            background-color: #fee2e2;
            border: 1px solid #ef4444;
            color: #b91c1c;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-weight: bold;
        }
        .results-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .scenarios {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        @media (max-width: 600px) {
            .scenarios { grid-template-columns: 1fr; }
        }
        .card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .card.active { border-color: #2563eb; background-color: #eff6ff; }
        .card h3 { margin-top: 0; color: #1e3a8a; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px;}
        .rod-list {
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
            background: #f8fafc;
            padding: 8px;
            border-radius: 4px;
            margin-top: 10px;
        }
        canvas {
            width: 100%;
            background: #fafafa;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>HDD Setback & Bore Plan Calculator</h1>
    
    <div id="errorBox" class="error-msg"></div>

    <div class="grid">
        <div class="input-panel">
            <div class="input-group">
                <label for="entryPitch">Entry Pitch (%)</label>
                <input type="number" id="entryPitch" value="20" step="0.1">
            </div>
            <div class="input-group">
                <label for="rodLength">Rod Length (ft)</label>
                <input type="number" id="rodLength" value="10" step="0.1">
            </div>
            <div class="input-group">
                <label for="targetDepth">Target Depth (ft)</label>
                <input type="number" id="targetDepth" value="12" step="0.1">
            </div>
            <div class="input-group">
                <label for="maxBend">Max Bend Per Rod (% change)</label>
                <input type="number" id="maxBend" value="4" step="0.1">
            </div>
            <div class="input-group">
                <label for="desiredSetback">Desired Setback Length (ft)</label>
                <input type="number" id="desiredSetback" value="65" step="0.1">
            </div>
            <button onclick="calculateBore()">Calculate Bore Plans</button>
        </div>

        <div class="results-panel">
            <div class="scenarios">
                <div class="card" id="shortCard">
                    <h3>Short (Max Bend)</h3>
                    <div id="shortOut"></div>
                </div>
                <div class="card" id="medCard">
                    <h3>Medium Turn</h3>
                    <div id="medOut"></div>
                </div>
                <div class="card" id="longCard">
                    <h3>Long / Gradual</h3>
                    <div id="longOut"></div>
                </div>
            </div>
            
            <canvas id="boreCanvas" width="800" height="300"></canvas>
        </div>
    </div>
</div>
<div class="card" id="customCard">
    <h3>Custom Target</h3>
    <div id="customOut"><i>Enter a desired setback...</i></div>
</div>

<script>
function calculateBore() {
    // 1. Reset display elements
    const errorBox = document.getElementById('errorBox');
    if(errorBox) { errorBox.style.display = 'none'; errorBox.innerText = ""; }
    
    document.getElementById('shortOut').innerHTML = "Calculating...";
    document.getElementById('medOut').innerHTML = "Calculating...";
    document.getElementById('longOut').innerHTML = "Calculating...";
    if(document.getElementById('customOut')) document.getElementById('customOut').innerHTML = "Calculating...";
    
    const canvas = document.getElementById('boreCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ['shortCard', 'medCard', 'longCard', 'customCard'].forEach(id => {
        if(document.getElementById(id)) document.getElementById(id).classList.remove('active');
    });

    // 2. Read field variables
    const P0 = parseFloat(document.getElementById('entryPitch').value);
    const rodL = parseFloat(document.getElementById('rodLength').value);
    const targetDepth = parseFloat(document.getElementById('targetDepth').value);
    const maxBend = parseFloat(document.getElementById('maxBend').value);
    const desiredSetback = parseFloat(document.getElementById('desiredSetback').value);

    if (isNaN(P0) || isNaN(rodL) || isNaN(targetDepth) || isNaN(maxBend) ||
        P0 <= 0 || rodL <= 0 || targetDepth <= 0 || maxBend <= 0) {
        showError("Please enter valid positive numbers for all core parameters.");
        return;
    }

    // 3. Generate Standard Arc Profiles
    const shortPlan = generateMinimumCurvatureProfile(P0, targetDepth, rodL, maxBend);
    const medPlan = generateMinimumCurvatureProfile(P0, targetDepth, rodL, maxBend * 0.6);
    const longPlan = generateMinimumCurvatureProfile(P0, targetDepth, rodL, maxBend * 0.35);

    // If the absolute tightest allowed bend can't make it, the entire configuration is impossible
    if (!shortPlan.possible) {
        showError(`ERROR: Bore configuration structurally impossible. Even at maximum allowable bend (${maxBend}%), the rods cannot curve up fast enough to hit a ${targetDepth} ft depth.`);
        renderOutput('shortOut', shortPlan);
        renderOutput('medOut', medPlan);
        renderOutput('longOut', longPlan);
        return;
    }

    // 4. Calculate CUSTOM TARGET Setback Profile
    let customPlan = { possible: false, errorMsg: "Enter a targeted footprint distance to calculate a custom plan." };
    if (!isNaN(desiredSetback) && desiredSetback > 0) {
        let theta0 = Math.atan(P0 / 100);
        let absoluteMinSetback = shortPlan.naturalSetback;

        if (desiredSetback < absoluteMinSetback) {
            customPlan.errorMsg = `Target too close! Requires exceeding your ${maxBend}% safety limit.`;
        } else {
            customPlan = generateMinimumCurvatureProfile(P0, targetDepth, rodL, maxBend, desiredSetback);
            customPlan.isCustom = true;
        }
    }

    // 5. Render Data to Display Cards (Handles "Not Available" automatically)
    renderOutput('shortOut', shortPlan);
    renderOutput('medOut', medPlan);
    renderOutput('longOut', longPlan);

    if(document.getElementById('customOut')) {
        if(customPlan.possible) {
            renderOutput('customOut', customPlan);
            document.getElementById('customCard').classList.add('active');
        } else {
            document.getElementById('customOut').innerHTML = `<p style="color:#e11d48; font-weight:bold; margin-top:10px;">${customPlan.errorMsg}</p>`;
        }
    }

    // 6. Map Line Aesthetics for Graphing
    shortPlan.label = "Short"; shortPlan.color = "#e11d48";
    medPlan.label = "Medium"; medPlan.color = "#2563eb";
    longPlan.label = "Long"; longPlan.color = "#16a34a";
    customPlan.label = "Target"; customPlan.color = "#9333ea";

    // Gather only the plans that are mathematically possible to draw on the chart
    let plansToDraw = [shortPlan, medPlan, longPlan];
    if (customPlan.possible) plansToDraw.push(customPlan);

    drawBorePlans(plansToDraw, targetDepth);
}

// ADVANCED ENGINE: Tracks true continuous circular arc paths across the rod string
function generateMinimumCurvatureProfile(entryPitch, targetDepth, rodL, bendPerRod, targetSetback) {
    let profile = { possible: true, rods: [], setback: 0, totalRods: 0, naturalSetback: 0 };
    
    let theta0 = Math.atan(entryPitch / 100);
    let thetaChangePerRod = Math.atan(bendPerRod / 100);
    let k = thetaChangePerRod / rodL; 

    let curveDepth = (1 - Math.cos(theta0)) / k;

    // Guardrail: If the bend is too gradual to level out before hitting or passing the target depth
    if (curveDepth > targetDepth) {
        profile.possible = false;
        return profile;
    }

    let straightDepth = targetDepth - curveDepth;
    let straightLength = straightDepth / Math.sin(theta0);
    let curveLength = theta0 / k;
    
    let naturalX = (straightLength * Math.cos(theta0)) + (Math.sin(theta0) / k);
    profile.naturalSetback = naturalX;

    let flatLengthNeeded = 0;
    if (targetSetback !== undefined && targetSetback > naturalX) {
        flatLengthNeeded = targetSetback - naturalX;
    }

    let totalPathLength = straightLength + curveLength + flatLengthNeeded;
    let totalRodsCount = Math.ceil(totalPathLength / rodL);

    for (let i = 1; i <= totalRodsCount; i++) {
        let s = Math.min(i * rodL, totalPathLength);
        let x = 0, y = 0, theta = 0;
        let isFlat = false;

        if (s <= straightLength) {
            x = s * Math.cos(theta0);
            y = s * Math.sin(theta0);
            theta = theta0;
        } else if (s <= straightLength + curveLength) {
            let s_curve = s - straightLength;
            theta = theta0 - (k * s_curve);
            x = (straightLength * Math.cos(theta0)) + ((Math.sin(theta0) - Math.sin(theta)) / k);
            y = (straightLength * Math.sin(theta0)) + ((Math.cos(theta) - Math.cos(theta0)) / k);
        } else {
            let s_flat = s - (straightLength + curveLength);
            x = naturalX + s_flat;
            y = targetDepth;
            theta = 0;
            isFlat = true;
        }

        profile.rods.push({
            rodNum: i,
            pitch: Math.max(0, Math.tan(theta) * 100),
            x: x,
            y: y,
            isFlat: isFlat
        });
    }

    profile.setback = Math.max(...profile.rods.map(r => r.x));
    profile.totalRods = totalPathLength / rodL;
    return profile;
}

function renderOutput(elementId, plan) {
    // If the plan broke engineering constraints, gracefully output a clean placeholder label
    if (!plan || !plan.possible) {
        document.getElementById(elementId).innerHTML = `<p style="color:#94a3b8; font-style:italic; font-weight:500; margin-top:10px; font-size:1.1rem;">⚠️ Not Available</p>`;
        return;
    }

    let html = `
        <p><strong>Actual Setback:</strong> ${plan.setback.toFixed(1)} ft</p>
        <p><strong>Total Rods:</strong> ${plan.totalRods.toFixed(1)}</p>
        <div class="rod-list">
            <strong>Rod-by-Rod Pitch Plan:</strong><br>
    `;

    plan.rods.forEach((r, index) => {
        let displayPitch = r.pitch.toFixed(1);
        if (r.isFlat) {
            html += `Rod ${r.rodNum}: <span style="color: #16a34a;"><b>Coast flat at 0.0% (At Target)</b></span><br>`;
        } else if (index === 0) {
            html += `Rod 1: <b>Entry pitch rod at ${displayPitch}%</b><br>`;
        } else {
            let previousPitch = plan.rods[index - 1].pitch.toFixed(1);
            if (displayPitch === previousPitch) {
                html += `Rod ${r.rodNum}: <b>Keep at ${displayPitch}%</b><br>`;
            } else {
                html += `Rod ${r.rodNum}: <b>Adjust to ${displayPitch}%</b><br>`;
            }
        }
    });
    html += `</div>`;
    document.getElementById(elementId).innerHTML = html;
}

function showError(msg) {
    const errorBox = document.getElementById('errorBox');
    if(errorBox) { errorBox.innerText = msg; errorBox.style.display = 'block'; }
}

function drawBorePlans(plans, targetDepth) {
    const canvas = document.getElementById('boreCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Only look at working plans to establish the graph dimensions
    let validPlans = plans.filter(p => p && p.possible);
    if (validPlans.length === 0) return;

    let maxSetback = Math.max(...validPlans.map(p => p.setback));
    
    let marginX = 50, marginY = 40;
    let scaleX = (canvas.width - marginX * 2) / (maxSetback * 1.1);
    let scaleY = (canvas.height - marginY * 2) / (targetDepth * 1.3);

    // Draw Ground Line
    ctx.beginPath(); ctx.strokeStyle = '#64748b'; ctx.lineWidth = 2;
    ctx.moveTo(0, marginY); ctx.lineTo(canvas.width, marginY); ctx.stroke();
    ctx.fillStyle = '#64748b'; ctx.fillText("Ground Level", 10, marginY - 10);

    // Draw Target Line
    ctx.beginPath(); ctx.strokeStyle = '#cbd5e1'; ctx.setLineDash([5, 5]);
    ctx.moveTo(0, marginY + targetDepth * scaleY); ctx.lineTo(canvas.width, marginY + targetDepth * scaleY); ctx.stroke();
    ctx.setLineDash([]); ctx.fillStyle = '#94a3b8'; ctx.fillText(`Target Depth (${targetDepth} ft)`, 10, marginY + targetDepth * scaleY + 15);

    plans.forEach((plan, index) => {
        if (!plan || !plan.possible) return; // Skip drawing any broken lines entirely

        ctx.beginPath();
        ctx.strokeStyle = plan.color;
        ctx.lineWidth = plan.isCustom ? 4 : 3;
        
        let entryX = marginX + (maxSetback - plan.setback) * scaleX;
        ctx.moveTo(entryX, marginY);

        plan.rods.forEach(rod => {
            let cx = entryX + rod.x * scaleX;
            let cy = marginY + rod.y * scaleY;
            ctx.lineTo(cx, cy);
        });
        ctx.stroke();

        ctx.beginPath(); ctx.fillStyle = plan.color; ctx.arc(entryX, marginY, 4, 0, 2 * Math.PI); ctx.fill();
        ctx.font = "bold 12px sans-serif";
        ctx.fillText(`${plan.label}: ${plan.setback.toFixed(1)} ft`, entryX, marginY + 25 + (index * 15));
    });
}

window.onload = calculateBore;
</script>

</body>
</html>
