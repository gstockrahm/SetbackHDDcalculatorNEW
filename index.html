<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDD Setback & Bore Plan Calculator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #1a365d;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
        .input-panel {
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #4a5568;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .error-msg {
            background-color: #fee2e2;
            border: 1px solid #ef4444;
            color: #b91c1c;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-weight: bold;
        }
        .results-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .scenarios {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        @media (max-width: 600px) {
            .scenarios { grid-template-columns: 1fr; }
        }
        .card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .card.active { border-color: #2563eb; background-color: #eff6ff; }
        .card h3 { margin-top: 0; color: #1e3a8a; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px;}
        .rod-list {
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
            background: #f8fafc;
            padding: 8px;
            border-radius: 4px;
            margin-top: 10px;
        }
        canvas {
            width: 100%;
            background: #fafafa;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>HDD Setback & Bore Plan Calculator</h1>
    
    <div id="errorBox" class="error-msg"></div>

    <div class="grid">
        <div class="input-panel">
            <div class="input-group">
                <label for="entryPitch">Entry Pitch (%)</label>
                <input type="number" id="entryPitch" value="20" step="0.1">
            </div>
            <div class="input-group">
                <label for="rodLength">Rod Length (ft)</label>
                <input type="number" id="rodLength" value="10" step="0.1">
            </div>
            <div class="input-group">
                <label for="targetDepth">Target Depth (ft)</label>
                <input type="number" id="targetDepth" value="12" step="0.1">
            </div>
            <div class="input-group">
                <label for="maxBend">Max Bend Per Rod (% change)</label>
                <input type="number" id="maxBend" value="4" step="0.1">
            </div>
            <div class="input-group">
                <label for="desiredSetback">Desired Setback Length (ft)</label>
                <input type="number" id="desiredSetback" value="65" step="0.1">
            </div>
            <button onclick="calculateBore()">Calculate Bore Plans</button>
        </div>

        <div class="results-panel">
            <div class="scenarios">
                <div class="card" id="shortCard">
                    <h3>Short (Max Bend)</h3>
                    <div id="shortOut"></div>
                </div>
                <div class="card" id="medCard">
                    <h3>Medium Turn</h3>
                    <div id="medOut"></div>
                </div>
                <div class="card" id="longCard">
                    <h3>Long / Gradual</h3>
                    <div id="longOut"></div>
                </div>
            </div>
            
            <canvas id="boreCanvas" width="800" height="300"></canvas>
        </div>
    </div>
</div>

<script>
function calculateBore() {
    // 1. Clear out previous data immediately
    const errorBox = document.getElementById('errorBox');
    errorBox.style.display = 'none';
    errorBox.innerText = "";
    
    document.getElementById('shortOut').innerHTML = "Calculating...";
    document.getElementById('medOut').innerHTML = "Calculating...";
    document.getElementById('longOut').innerHTML = "Calculating...";
    
    const canvas = document.getElementById('boreCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    document.getElementById('shortCard').classList.remove('active');
    document.getElementById('medCard').classList.remove('active');
    document.getElementById('longCard').classList.remove('active');

    // 2. Read inputs
    const P0 = parseFloat(document.getElementById('entryPitch').value);
    const rodL = parseFloat(document.getElementById('rodLength').value);
    const targetDepth = parseFloat(document.getElementById('targetDepth').value);
    const maxBend = parseFloat(document.getElementById('maxBend').value);
    const desiredSetback = parseFloat(document.getElementById('desiredSetback').value);

    // 3. Validation
    if (isNaN(P0) || isNaN(rodL) || isNaN(targetDepth) || isNaN(maxBend) ||
        P0 <= 0 || rodL <= 0 || targetDepth <= 0 || maxBend <= 0) {
        showError("Please enter valid positive numbers for all parameters.");
        clearOutputs();
        return;
    }

    // 4. Generate Constant Curvature Profiles
    // Short uses max allowable bend. Med and Long use smoother fractions.
    const shortPlan = generateConstantCurvatureProfile(P0, targetDepth, rodL, maxBend);
    const medPlan = generateConstantCurvatureProfile(P0, targetDepth, rodL, maxBend * 0.6);
    const longPlan = generateConstantCurvatureProfile(P0, targetDepth, rodL, maxBend * 0.35);

    if (!shortPlan.possible) {
        showError(`ERROR: Bore impossible! At max allowable bend (${maxBend}%), the drill string cannot smoothly level out at ${targetDepth} ft without overshooting. Decrease entry pitch or increase allowable bend.`);
        clearOutputs();
        return;
    }

    // 5. Render outputs to the screen
    renderOutput('shortOut', shortPlan);
    renderOutput('medOut', medPlan);
    renderOutput('longOut', longPlan);

    // 6. Highlight closest match card
    let diffs = [];
    if (shortPlan.possible) diffs.push({id: 'shortCard', val: Math.abs(shortPlan.setback - desiredSetback)});
    if (medPlan.possible) diffs.push({id: 'medCard', val: Math.abs(medPlan.setback - desiredSetback)});
    if (longPlan.possible) diffs.push({id: 'longCard', val: Math.abs(longPlan.setback - desiredSetback)});
    
    if (diffs.length > 0) {
        diffs.sort((a,b) => a.val - b.val);
        document.getElementById(diffs[0].id).classList.add('active');
    }

    // 7. Redraw visual chart
    drawBorePlans([shortPlan, medPlan, longPlan], targetDepth);
}

function clearOutputs() {
    document.getElementById('shortOut').innerHTML = "<i>N/A</i>";
    document.getElementById('medOut').innerHTML = "<i>N/A</i>";
    document.getElementById('longOut').innerHTML = "<i>N/A</i>";
}

function generateConstantCurvatureProfile(entryPitch, targetDepth, rodL, bendPerRod) {
    let profile = { possible: true, rods: [], setback: 0, totalRods: 0 };
    
    // Convert entry pitch percent to true radians for exact geometric modeling
    let theta0 = Math.atan(entryPitch / 100);
    
    // Approximate angle change limit per foot of rod based on the user's input parameter
    let thetaChangePerRod = Math.atan(bendPerRod / 100);
    let k = thetaChangePerRod / rodL; // Curvature constant (radians per foot)

    // Calculate vertical depth consumed purely during a continuous, perfect transition curve
    let curveDepth = (1 - Math.cos(theta0)) / k;

    // Field Check: If the depth needed to transition smoothly exceeds the target depth, it's a bust
    if (curveDepth > targetDepth) {
        profile.possible = false;
        return profile;
    }

    // The remaining depth is covered by driving a perfectly straight entry line
    let straightDepth = targetDepth - curveDepth;
    let straightLength = straightDepth / Math.sin(theta0);

    let totalLength = straightLength + (theta0 / k);
    let totalRodsCount = Math.ceil(totalLength / rodL);
    
    let x = 0;
    let y = 0;

    // Build the rod-by-rod plan tracking center-line position and running pitch
    for (let i = 1; i <= totalRodsCount; i++) {
        // Calculate the distance at the END of this specific rod segment
        let currentDistance = i * rodL;
        
        // Prevent the rod distance loop from overshooting the mathematical end of the bore path
        if (currentDistance > totalLength) {
            currentDistance = totalLength;
        }
        
        let currentPitch = 0;

        if (currentDistance <= straightLength) {
            // Section A: Straight track section
            x = currentDistance * Math.cos(theta0);
            y = currentDistance * Math.sin(theta0);
            currentPitch = entryPitch;
        } else {
            // Section B: Smooth transition arc section
            let sCurve = currentDistance - straightLength;
            let theta = theta0 - (k * sCurve);
            
            // Integrate positions using exact geometric tracking
            x = (straightLength * Math.cos(theta0)) + ((Math.sin(theta0) - Math.sin(theta)) / k);
            y = (straightLength * Math.sin(theta0)) + ((Math.cos(theta) - Math.cos(theta0)) / k);
            currentPitch = Math.max(0, Math.tan(theta) * 100);
        }

        profile.rods.push({
            rodNum: i,
            pitch: currentPitch,
            x: x,
            y: y
        });
    }

    profile.setback = x;
    profile.totalRods = totalLength / rodL;
    return profile;
}

function renderOutput(elementId, plan) {
    if (!plan.possible) {
        document.getElementById(elementId).innerHTML = "<p>Not possible with this configuration.</p>";
        return;
    }
    let html = `
        <p><strong>Setback:</strong> ${plan.setback.toFixed(1)} ft</p>
        <p><strong>Total Rods:</strong> ${plan.totalRods.toFixed(1)}</p>
        <div class="rod-list">
            <strong>Rod-by-Rod Pitch Plan:</strong><br>
    `;

    plan.rods.forEach((r, index) => {
        let displayPitch = r.pitch.toFixed(1);
        
        if (index === 0) {
            html += `Rod 1: <b>Entry pitch rod at ${displayPitch}%</b><br>`;
        } else {
            let previousPitch = plan.rods[index - 1].pitch.toFixed(1);
            if (displayPitch === previousPitch) {
                html += `Rod ${index + 1}: <b>Keep at ${displayPitch}%</b><br>`;
            } else {
                html += `Rod ${index + 1}: <b>Adjust to ${displayPitch}%</b><br>`;
            }
        }
    });
    html += `</div>`;
    document.getElementById(elementId).innerHTML = html;
}

function showError(msg) {
    const errorBox = document.getElementById('errorBox');
    errorBox.innerText = msg;
    errorBox.style.display = 'block';
}

function drawBorePlans(plans, targetDepth) {
    const canvas = document.getElementById('boreCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let validPlans = plans.filter(p => p.possible);
    if (validPlans.length === 0) return;

    let maxSetback = Math.max(...validPlans.map(p => p.setback));
    
    let marginX = 50;
    let marginY = 40;
    let scaleX = (canvas.width - marginX * 2) / (maxSetback * 1.1);
    let scaleY = (canvas.height - marginY * 2) / (targetDepth * 1.3);

    // Draw Ground Line
    ctx.beginPath();
    ctx.strokeStyle = '#64748b';
    ctx.lineWidth = 2;
    ctx.moveTo(0, marginY);
    ctx.lineTo(canvas.width, marginY);
    ctx.stroke();
    ctx.fillStyle = '#64748b';
    ctx.fillText("Ground Level", 10, marginY - 10);

    // Draw Target Line
    ctx.beginPath();
    ctx.strokeStyle = '#cbd5e1';
    ctx.setLineDash([5, 5]);
    ctx.moveTo(0, marginY + targetDepth * scaleY);
    ctx.lineTo(canvas.width, marginY + targetDepth * scaleY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#94a3b8';
    ctx.fillText(`Target Depth (${targetDepth} ft)`, 10, marginY + targetDepth * scaleY + 15);

    const colors = ['#e11d48', '#2563eb', '#16a34a'];
    const labels = ['Short', 'Medium', 'Long'];

    plans.forEach((plan, index) => {
        if(!plan.possible) return;

        ctx.beginPath();
        ctx.strokeStyle = colors[index];
        ctx.lineWidth = 3;
        
        let entryX = marginX + (maxSetback - plan.setback) * scaleX;
        ctx.moveTo(entryX, marginY);

        plan.rods.forEach(rod => {
            let cx = entryX + rod.x * scaleX;
            let cy = marginY + rod.y * scaleY;
            ctx.lineTo(cx, cy);
        });
        ctx.stroke();

        ctx.beginPath();
        ctx.fillStyle = colors[index];
        ctx.arc(entryX, marginY, 4, 0, 2 * Math.PI);
        ctx.fill();

        ctx.fillStyle = colors[index];
        ctx.font = "bold 12px sans-serif";
        ctx.fillText(`${labels[index]}: ${plan.setback.toFixed(1)} ft setback`, entryX, marginY + 25 + (index * 15));
    });
}

window.onload = calculateBore;
</script>

</body>
</html>
